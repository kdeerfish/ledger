# ============================================================
# Ledger - Docker Compose 配置
# 飞牛OS (FnOS) 使用方式：
#   1. 在飞牛OS 文件管理器创建目录 /docker/ledger
#   2. 把本文件和 .env 放进去
#   3. 飞牛OS Docker → 项目 → 新建 → 选择此目录 → 部署
#   4. 浏览器访问 http://飞牛OS_IP:5000
# ============================================================

version: "3.8"

services:
  ledger:
    build: .
    image: ledger:latest
    container_name: ledger
    restart: unless-stopped

    # 端口映射（宿主机:容器）
    ports:
      - "5000:5000"

    # 数据持久化（数据库）
    volumes:
      # SQLite 数据库存到宿主机，删容器不丢数据
      - ./data:/data
      # 可选：挂载自定义 .env 配置
      - ./.env:/app/.env:ro

    # 环境变量（会覆盖 .env 文件）
    environment:
      - WEB_HOST=0.0.0.0
      - WEB_PORT=5000
      - WEB_DEBUG=false
      - LEDGER_DB_PATH=/data/ledger.db
      - TZ=Asia/Shanghai

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/info')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # 日志限制
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
