<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📒 Ledger 个人账本</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-ledger sticky-top">
    <div class="container">
      <a class="navbar-brand" href="#" onclick="showPage('dashboard')">
        <i class="bi bi-journal-text"></i> Ledger
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="dashboard" onclick="showPage('dashboard')">
              <i class="bi bi-speedometer2"></i> 概览
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="transactions" onclick="showPage('transactions')">
              <i class="bi bi-list-ul"></i> 交易
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="budgets" onclick="showPage('budgets')">
              <i class="bi bi-pie-chart"></i> 预算
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="categories" onclick="showPage('categories')">
              <i class="bi bi-tags"></i> 类别
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-page="stats" onclick="showPage('stats')">
              <i class="bi bi-graph-up"></i> 统计
            </a>
          </li>
        </ul>
        <span class="navbar-text" id="navDbInfo">
          <i class="bi bi-database"></i> <span id="txCount">-</span> 条记录
        </span>
      </div>
    </div>
  </nav>

  <div class="container py-4">

    <!-- ══════════ Dashboard ══════════ -->
    <div id="page-dashboard" class="page-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-speedometer2"></i> 收支概览</h4>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" id="summaryYear" onchange="loadDashboard()" style="width:auto">
          </select>
          <select class="form-select form-select-sm" id="summaryMonth" onchange="loadDashboard()" style="width:auto">
            <option value="">全年</option>
          </select>
        </div>
      </div>

      <!-- Summary Cards -->
      <div class="row g-3 mb-4" id="summaryCards">
        <div class="col-md-4">
          <div class="card summary-card income">
            <div class="card-body">
              <div class="card-title"><i class="bi bi-arrow-down-circle"></i> 收入</div>
              <p class="amount" id="totalIncome">-</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card summary-card expense">
            <div class="card-body">
              <div class="card-title"><i class="bi bi-arrow-up-circle"></i> 支出</div>
              <p class="amount" id="totalExpense">-</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card summary-card balance">
            <div class="card-body">
              <div class="card-title"><i class="bi bi-wallet2"></i> 结余</div>
              <p class="amount" id="totalBalance">-</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Chart & Recent Transactions -->
      <div class="row g-3">
        <div class="col-lg-7">
          <div class="card shadow-sm">
            <div class="card-body">
              <h6 class="card-title mb-3"><i class="bi bi-bar-chart"></i> 月度趋势</h6>
              <div class="chart-container">
                <canvas id="trendChart" class="trend-chart"></canvas>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0"><i class="bi bi-clock-history"></i> 最近交易</h6>
                <a href="#" class="btn btn-sm btn-outline-ledger" onclick="showPage('transactions')">查看全部</a>
              </div>
              <div id="recentTxList"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══════════ Transactions ══════════ -->
    <div id="page-transactions" class="page-content" style="display:none">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h4 class="mb-0"><i class="bi bi-list-ul"></i> 交易记录</h4>
        <button class="btn btn-ledger" onclick="openAddModal()">
          <i class="bi bi-plus-lg"></i> 记一笔
        </button>
      </div>

      <!-- Search/Filter -->
      <div class="row g-2 mb-3">
        <div class="col-md-4">
          <input type="text" class="form-control search-bar" id="searchKeyword"
                 placeholder="搜索备注、类别、商家..." oninput="debounceSearch()">
        </div>
        <div class="col-md-2">
          <select class="form-select" id="filterType" onchange="loadTransactions()">
            <option value="">全部类型</option>
            <option value="支出">支出</option>
            <option value="收入">收入</option>
          </select>
        </div>
        <div class="col-md-2">
          <select class="form-select" id="filterCategory" onchange="loadTransactions()">
            <option value="">全部类别</option>
          </select>
        </div>
        <div class="col-md-2">
          <input type="date" class="form-control" id="filterStartDate" onchange="loadTransactions()">
        </div>
        <div class="col-md-2">
          <input type="date" class="form-control" id="filterEndDate" onchange="loadTransactions()">
        </div>
      </div>

      <!-- Table -->
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-ledger table-hover mb-0">
              <thead>
                <tr>
                  <th>日期</th>
                  <th>类型</th>
                  <th>金额</th>
                  <th>类别</th>
                  <th>子类别</th>
                  <th>账户</th>
                  <th>商家</th>
                  <th>项目</th>
                  <th>成员</th>
                  <th>备注</th>
                  <th style="width:80px">操作</th>
                </tr>
              </thead>
              <tbody id="txTableBody">
                <tr><td colspan="11" class="text-center text-muted py-4">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mt-2">
        <small class="text-muted" id="txCountInfo"></small>
        <nav>
          <ul class="pagination pagination-sm mb-0" id="txPagination"></ul>
        </nav>
      </div>
    </div>

    <!-- ══════════ Budgets ══════════ -->
    <div id="page-budgets" class="page-content" style="display:none">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h4 class="mb-0"><i class="bi bi-pie-chart"></i> 预算管理</h4>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" id="budgetYear" onchange="loadBudgets()" style="width:auto">
          </select>
          <select class="form-select form-select-sm" id="budgetMonth" onchange="loadBudgets()" style="width:auto">
          </select>
          <button class="btn btn-ledger btn-sm" onclick="openBudgetModal()">
            <i class="bi bi-plus-lg"></i> 设置预算
          </button>
        </div>
      </div>

      <div id="budgetList" class="row g-3"></div>

      <!-- Budget Progress -->
      <div class="card shadow-sm mt-4">
        <div class="card-body">
          <h6 class="card-title mb-3"><i class="bi bi-graph-up"></i> 预算执行明细</h6>
          <div id="budgetDetailList"></div>
        </div>
      </div>
    </div>

    <!-- ══════════ Categories ══════════ -->
    <div id="page-categories" class="page-content" style="display:none">
      <h4 class="mb-4"><i class="bi bi-tags"></i> 类别统计</h4>
      <div class="row g-3" id="categoryList"></div>
    </div>

    <!-- ══════════ Stats ══════════ -->
    <div id="page-stats" class="page-content" style="display:none">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-graph-up"></i> 统计分析</h4>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" id="statsYear" onchange="loadStats()" style="width:auto">
          </select>
          <select class="form-select form-select-sm" id="statsGroupBy" onchange="loadStats()" style="width:auto">
            <option value="category">按类别</option>
            <option value="account">按账户</option>
            <option value="month">按月</option>
          </select>
        </div>
      </div>
      <div class="row g-3">
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="chart-container">
                <canvas id="statsChart" height="300"></canvas>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card shadow-sm">
            <div class="card-body">
              <h6 class="card-title mb-3"><i class="bi bi-table"></i> 数据明细</h6>
              <div class="table-responsive">
                <table class="table stats-table">
                  <thead><tr><th>分组</th><th>类型</th><th>金额</th><th>笔数</th></tr></thead>
                  <tbody id="statsTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Footer ── -->
  <div class="footer-ledger">
    <small>Ledger · 个人记账系统 · <span id="footerRecords">-</span> 条记录</small>
  </div>

  <!-- ══════════ Modals ══════════ -->

  <!-- Add/Edit Transaction Modal -->
  <div class="modal fade" id="txModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="txModalTitle">记一笔</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="txForm">
            <input type="hidden" id="txId">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">类型</label>
                <select class="form-select" id="txType" required>
                  <option value="支出">支出</option>
                  <option value="收入">收入</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">金额 *</label>
                <input type="number" step="0.01" class="form-control" id="txAmount" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">日期</label>
                <input type="datetime-local" class="form-control" id="txDate">
              </div>
              <div class="col-md-4">
                <label class="form-label">类别</label>
                <input type="text" class="form-control" id="txCategory" list="catSuggest" placeholder="如：食品酒水">
                <datalist id="catSuggest"></datalist>
              </div>
              <div class="col-md-4">
                <label class="form-label">子类别</label>
                <input type="text" class="form-control" id="txSubcategory" placeholder="如：水果">
              </div>
              <div class="col-md-4">
                <label class="form-label">账户</label>
                <input type="text" class="form-control" id="txAccount" list="accSuggest" placeholder="如：微信">
                <datalist id="accSuggest"></datalist>
              </div>
              <div class="col-md-4">
                <label class="form-label">商家</label>
                <input type="text" class="form-control" id="txMerchant" placeholder="如：美团">
              </div>
              <div class="col-md-4">
                <label class="form-label">项目</label>
                <input type="text" class="form-control" id="txProject" placeholder="项目名称">
              </div>
              <div class="col-md-4">
                <label class="form-label">成员</label>
                <input type="text" class="form-control" id="txMember" placeholder="如：家人">
              </div>
              <div class="col-12">
                <label class="form-label">备注</label>
                <textarea class="form-control" id="txNote" rows="2" placeholder="备注信息"></textarea>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-ledger" onclick="saveTransaction()">
            <i class="bi bi-check-lg"></i> 保存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Budget Modal -->
  <div class="modal fade" id="budgetModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">设置预算</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="budgetForm">
            <div class="mb-3">
              <label class="form-label">类别</label>
              <input type="text" class="form-control" id="budgetCategory" list="catSuggest2" placeholder="如：食品酒水">
              <datalist id="catSuggest2"></datalist>
            </div>
            <div class="mb-3">
              <label class="form-label">预算金额</label>
              <input type="number" step="0.01" class="form-control" id="budgetAmount" required>
            </div>
            <div class="row g-2">
              <div class="col-6">
                <label class="form-label">年</label>
                <select class="form-select" id="budgetSetYear"></select>
              </div>
              <div class="col-6">
                <label class="form-label">月</label>
                <select class="form-select" id="budgetSetMonth"></select>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-ledger" onclick="saveBudget()">
            <i class="bi bi-check-lg"></i> 保存
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center py-4">
          <i class="bi bi-exclamation-triangle text-warning" style="font-size:2.5rem"></i>
          <p class="mt-2 mb-0" id="confirmMsg">确认删除此记录？</p>
        </div>
        <div class="modal-footer justify-content-center border-0 pt-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-danger" id="confirmBtn" onclick="confirmAction()">
            <i class="bi bi-trash"></i> 确认
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Toast Container ── -->
  <div class="toast-container"></div>

  <!-- ── Scripts ── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script>
  // ════════════════════════════════════════════════════════════════
  // Ledger Web - 前端主逻辑
  // ════════════════════════════════════════════════════════════════

  // ── State ──
  let state = {
    currentPage: 'dashboard',
    txPage: 1,
    txPageSize: 20,
    trendChart: null,
    statsChart: null,
    pendingAction: null,
  };

  // ── Utilities ──
  function $(id) { return document.getElementById(id); }

  function formatAmount(v) {
    return Number(v || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function escapeHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function truncate(s, n=15) {
    return s && s.length > n ? escapeHtml(s.slice(0, n)) + '...' : escapeHtml(s || '-');
  }

  function nowISO() {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function toast(msg, type='success') {
    const colors = {success: '#10b981', danger: '#ef4444', warning: '#f59e0b', info: '#3b82f6'};
    const icons = {success: 'bi-check-circle-fill', danger: 'bi-x-circle-fill', warning: 'bi-exclamation-triangle-fill', info: 'bi-info-circle-fill'};
    const c = document.querySelector('.toast-container');
    const el = document.createElement('div');
    el.className = 'toast toast-ledger align-items-center border-0';
    el.setAttribute('role', 'alert');
    el.innerHTML = `<div class="d-flex">
      <div class="toast-body"><i class="bi ${icons[type]||icons.info}" style="color:${colors[type]||colors.info}"></i> ${msg}</div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>`;
    c.appendChild(el);
    const t = new bootstrap.Toast(el, {delay: 3000});
    t.show();
    el.addEventListener('hidden.bs.toast', () => el.remove());
  }

  async function updateNavCount() {
    try {
      const info = await api('/info');
      if (info.data) {
        $('txCount').textContent = info.data.active_records || 0;
        $('footerRecords').textContent = info.data.active_records || 0;
      }
    } catch(e) {}
  }

  // ── Navigation ──
  function showPage(name) {
    state.currentPage = name;
    document.querySelectorAll('.page-content').forEach(el => el.style.display = 'none');
    const page = $('page-' + name);
    if (page) page.style.display = 'block';
    document.querySelectorAll('.navbar-nav .nav-link').forEach(el => {
      el.classList.toggle('active', el.dataset.page === name);
    });
    // Load data
    switch(name) {
      case 'dashboard': loadDashboard(); break;
      case 'transactions': loadTransactions(); break;
      case 'budgets': loadBudgets(); break;
      case 'categories': loadCategories(); break;
      case 'stats': loadStats(); break;
    }
  }

  // ── API Helper ──
  async function api(path, opts={}) {
    try {
      const res = await fetch('/api' + path, {
        headers: {'Content-Type': 'application/json', ...opts.headers},
        ...opts,
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || '请求失败');
      return data;
    } catch(e) {
      toast(e.message, 'danger');
      throw e;
    }
  }

  // ── Init ──
  async function init() {
    // Populate year/month selects
    const y = new Date().getFullYear();
    for (let i = y - 2; i <= y + 1; i++) {
      document.querySelectorAll('[id$="Year"], [id="statsYear"]').forEach(el => {
        el.innerHTML += `<option value="${i}" ${i===y?'selected':''}>${i}年</option>`;
      });
    }
    for (let i = 1; i <= 12; i++) {
      const opt = `<option value="${i}" ${i===new Date().getMonth()+1?'selected':''}>${i}月</option>`;
      document.querySelectorAll('[id$="Month"], [id="budgetSetMonth"]').forEach(el => {
        el.innerHTML += opt;
      });
    }

    // Load DB info
    try {
      const info = await api('/info');
      if (info.data) {
        $('txCount').textContent = info.data.active_records || info.data.total_records || 0;
      }
    } catch(e) {}

    // Load suggestions
    loadSuggestions();

    // Show dashboard
    showPage('dashboard');
  }

  async function loadSuggestions() {
    try {
      const cats = await api('/categories');
      const catOpts = cats.data.map(c => `<option value="${c.name}">`).join('');
      $('catSuggest').innerHTML = catOpts;
      $('catSuggest2').innerHTML = catOpts;
      // Populate filter category
      const sel = $('filterCategory');
      sel.innerHTML = '<option value="">全部类别</option>' + cats.data.map(c =>
        `<option value="${c.name}">${c.name}</option>`
      ).join('');

      const accs = await api('/accounts');
      $('accSuggest').innerHTML = accs.data.map(a => `<option value="${a.name}">`).join('');
    } catch(e) {}
  }

  // ══════════ Dashboard ══════════
  async function loadDashboard() {
    const year = $('summaryYear').value;
    const month = $('summaryMonth').value;
    const params = new URLSearchParams();
    if (year) params.set('year', year);
    if (month) params.set('month', month);

    try {
      const summary = await api('/summary?' + params.toString());
      if (summary.data) {
        $('totalIncome').textContent = '¥ ' + formatAmount(summary.data.income);
        $('totalExpense').textContent = '¥ ' + formatAmount(summary.data.expense);
        $('totalBalance').textContent = '¥ ' + formatAmount(summary.data.balance);
      }

      // Recent transactions
      const txRes = await api('/transactions?limit=5');
      if (txRes.data) {
        renderRecentTx(txRes.data.transactions || []);
        $('footerRecords').textContent = txRes.data.total || txRes.data.transactions.length;
      }

      // Update footer & navbar record count
      updateNavCount();

      // Trend chart
      loadTrendChart(year);
    } catch(e) {}
  }

  function renderRecentTx(txs) {
    const el = $('recentTxList');
    if (!txs.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无交易记录</p></div>';
      return;
    }
    el.innerHTML = txs.map(t => `
      <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
        <div>
          <small class="text-muted">${t.date ? t.date.slice(0,10) : ''}</small>
          <div>
            <span class="badge ${t.type==='收入'?'badge-type-income':'badge-type-expense'}">${t.type}</span>
            <small class="text-muted ms-1">${truncate(t.category, 8)}</small>
          </div>
        </div>
        <div class="text-end">
          <div class="${t.type==='收入'?'amount-income':'amount-expense'}">¥ ${formatAmount(t.amount)}</div>
          <small class="text-muted">${truncate(t.account, 8)}</small>
        </div>
      </div>
    `).join('');
  }

  async function loadTrendChart(year) {
    const params = new URLSearchParams();
    if (year) params.set('year', year);
    params.set('group_by', 'month');

    try {
      const res = await api('/stats?' + params.toString());
      if (!res.data || !res.data.items) return;
      const items = res.data.items.reverse(); // oldest first
      const labels = [...new Set(items.map(i => i.group))];
      const incomeData = labels.map(l => {
        const found = items.find(i => i.group === l && i.type === '收入');
        return found ? found.total : 0;
      });
      const expenseData = labels.map(l => {
        const found = items.find(i => i.group === l && i.type === '支出');
        return found ? found.total : 0;
      });

      if (state.trendChart) state.trendChart.destroy();

      const ctx = $('trendChart').getContext('2d');
      state.trendChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels.map(l => l ? l.slice(5) : l),
          datasets: [
            { label: '收入', data: incomeData, backgroundColor: 'rgba(16,185,129,.7)', borderRadius: 4 },
            { label: '支出', data: expenseData, backgroundColor: 'rgba(239,68,68,.7)', borderRadius: 4 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: {
            y: {
              beginAtZero: true,
              grace: '10%',
              ticks: {
                callback: v => '¥' + v.toLocaleString(),
                maxTicksLimit: 8,
              },
            },
          },
        },
      });
    } catch(e) {}
  }

  // ══════════ Transactions ══════════
  let searchTimer = null;
  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadTransactions, 300);
  }

  async function loadTransactions() {
    const keyword = $('searchKeyword').value.trim();
    const type = $('filterType').value;
    const cat = $('filterCategory').value;
    const start = $('filterStartDate').value;
    const end = $('filterEndDate').value;

    let params = new URLSearchParams();
    params.set('limit', state.txPageSize);
    params.set('offset', (state.txPage - 1) * state.txPageSize);

    let endpoint = '/transactions';
    if (keyword) {
      endpoint = '/transactions/search';
      params.set('keyword', keyword);
    }
    if (type) params.set('type', type);

    try {
      const res = await api(endpoint + '?' + params.toString());
      if (!res.data) return;
      const txs = res.data.transactions || res.data || [];
      const total = res.data.total || txs.length;
      renderTxTable(txs);
      $('txCountInfo').textContent = `共 ${total} 条记录`;
      renderPagination(total);
    } catch(e) {}
  }

  function renderTxTable(txs) {
    const tbody = $('txTableBody');
    if (!txs.length) {
      tbody.innerHTML = '<tr><td colspan="11" class="text-center text-muted py-4">📭 暂无交易记录</td></tr>';
      return;
    }
    tbody.innerHTML = txs.map(t => `
      <tr>
        <td class="text-nowrap"><small>${t.date ? t.date.slice(0, 10) : '-'}</small></td>
        <td><span class="badge ${t.type==='收入'?'badge-type-income':'badge-type-expense'}">${t.type}</span></td>
        <td class="${t.type==='收入'?'amount-income':'amount-expense'} text-nowrap">¥ ${formatAmount(t.amount)}</td>
        <td><small>${truncate(t.category, 10)}</small></td>
        <td><small>${truncate(t.subcategory, 10)}</small></td>
        <td><small>${truncate(t.account, 10)}</small></td>
        <td><small>${truncate(t.merchant, 10)}</small></td>
        <td><small>${truncate(t.project, 10)}</small></td>
        <td><small>${truncate(t.member, 8)}</small></td>
        <td><small class="text-muted">${truncate(t.note, 12)}</small></td>
        <td class="text-nowrap">
          <button class="btn btn-sm btn-outline-primary py-0 px-1" onclick="openEditModal(${t.id})" title="编辑">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="confirmDelete(${t.id})" title="删除">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function renderPagination(total) {
    const pages = Math.ceil(total / state.txPageSize);
    const el = $('txPagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= pages && i <= 20; i++) {
      html += `<li class="page-item ${i===state.txPage?'active':''}">
        <a class="page-link" href="#" onclick="state.txPage=${i};loadTransactions();return false">${i}</a>
      </li>`;
    }
    el.innerHTML = html;
  }

  // ── Add/Edit Transaction ──
  function openAddModal() {
    $('txModalTitle').textContent = '记一笔';
    $('txId').value = '';
    $('txForm').reset();
    $('txDate').value = nowISO();
    $('txAmount').value = '';
    new bootstrap.Modal($('txModal')).show();
  }

  async function openEditModal(id) {
    try {
      const res = await api('/transactions/' + id);
      const t = res.data;
      $('txModalTitle').textContent = '编辑交易 #' + id;
      $('txId').value = id;
      $('txType').value = t.type || '支出';
      $('txAmount').value = t.amount;
      $('txCategory').value = t.category || '';
      $('txSubcategory').value = t.subcategory || '';
      $('txAccount').value = t.account || '';
      $('txMerchant').value = t.merchant || '';
      $('txProject').value = t.project || '';
      $('txMember').value = t.member || '';
      $('txNote').value = t.note || '';
      // Format date for datetime-local
      if (t.date) {
        try {
          const d = t.date.replace(' ', 'T');
          $('txDate').value = d.slice(0, 16);
        } catch(e) { $('txDate').value = nowISO(); }
      } else {
        $('txDate').value = nowISO();
      }
      new bootstrap.Modal($('txModal')).show();
    } catch(e) {}
  }

  async function saveTransaction() {
    const id = $('txId').value;
    const amount = parseFloat($('txAmount').value) || 0;
    if (amount <= 0) {
      toast('金额必须大于零', 'warning');
      return;
    }
    const data = {
      type: $('txType').value,
      amount: parseFloat($('txAmount').value) || 0,
      category: $('txCategory').value.trim(),
      subcategory: $('txSubcategory').value.trim(),
      account: $('txAccount').value.trim(),
      merchant: $('txMerchant').value.trim(),
      project: $('txProject').value.trim(),
      member: $('txMember').value.trim(),
      note: $('txNote').value.trim(),
      date: $('txDate').value ? $('txDate').value.replace('T', ' ') : undefined,
      force: true,
    };

    try {
      if (id) {
        // Update - need to update each field individually, or use the bulk approach
        // For simplicity, we'll update the whole record through individual field updates
        const updates = [
          {field: 'amount', value: data.amount},
          {field: 'category', value: data.category},
          {field: 'subcategory', value: data.subcategory},
          {field: 'account', value: data.account},
          {field: 'merchant', value: data.merchant},
          {field: 'project', value: data.project},
          {field: 'member', value: data.member},
          {field: 'note', value: data.note},
          {field: 'trans_date', value: data.date},
        ];
        for (const u of updates) {
          if (u.value !== undefined && u.value !== '') {
            await api('/transactions/' + id, {
              method: 'PUT',
              body: JSON.stringify(u),
            });
          }
        }
        toast('更新成功');
      } else {
        await api('/transactions', {
          method: 'POST',
          body: JSON.stringify(data),
        });
        toast('添加成功');
      }
      bootstrap.Modal.getInstance($('txModal')).hide();
      updateNavCount();
      loadTransactions();
      loadSuggestions();
    } catch(e) {
      toast('操作失败: ' + (e.message || '请重试'), 'danger');
    }
  }

  // ── Delete ──
  let deleteTargetId = null;

  function confirmDelete(id) {
    deleteTargetId = id;
    $('confirmMsg').textContent = `确认删除交易 #${id}？可恢复。`;
    $('confirmBtn').innerHTML = '<i class="bi bi-trash"></i> 确认删除';
    $('confirmBtn').className = 'btn btn-danger';
    state.pendingAction = 'delete';
    new bootstrap.Modal($('confirmModal')).show();
  }

  async function confirmAction() {
    if (state.pendingAction === 'delete' && deleteTargetId) {
      try {
        await api('/transactions/' + deleteTargetId, {method: 'DELETE'});
        toast('已删除（可恢复）');
        updateNavCount();
        loadTransactions();
        loadDashboard();
      } catch(e) {}
    }
    bootstrap.Modal.getInstance($('confirmModal')).hide();
    deleteTargetId = null;
    state.pendingAction = null;
  }

  // ══════════ Budgets ══════════
  async function loadBudgets() {
    const year = $('budgetYear').value;
    const month = $('budgetMonth').value;

    try {
      const params = new URLSearchParams();
      if (year) params.set('year', year);
      if (month) params.set('month', month);

      const res = await api('/budgets/check?' + params.toString());
      const items = res.data || [];

      if (!items.length) {
        $('budgetList').innerHTML = '<div class="col-12"><div class="empty-state"><div class="icon">📊</div><p>本月暂无预算，点击"设置预算"开始规划</p></div></div>';
        $('budgetDetailList').innerHTML = '<p class="text-muted text-center py-3">暂无预算数据</p>';
        return;
      }

      // Budget cards
      $('budgetList').innerHTML = items.map(b => {
        const pct = b.percentage || 0;
        const barColor = pct > 100 ? 'bg-danger' : pct > 80 ? 'bg-warning' : 'bg-success';
        return `<div class="col-md-4">
          <div class="card summary-card h-100">
            <div class="card-body">
              <h6 class="card-title">${b.category}</h6>
              <div class="d-flex justify-content-between mb-2">
                <small class="text-muted">已用</small>
                <strong class="${pct > 100 ? 'text-danger' : ''}">¥ ${formatAmount(b.spent)}</strong>
              </div>
              <div class="progress progress-budget mb-2">
                <div class="progress-bar ${barColor}" style="width:${Math.min(pct, 100)}%"></div>
              </div>
              <div class="d-flex justify-content-between">
                <small>预算 ¥ ${formatAmount(b.budget)}</small>
                <small class="${b.remaining < 0 ? 'text-danger fw-bold' : 'text-muted'}">
                  ${b.remaining < 0 ? `超支 ¥ ${formatAmount(Math.abs(b.remaining))}` : `剩余 ¥ ${formatAmount(b.remaining)}`}
                </small>
              </div>
            </div>
          </div>
        </div>`;
      }).join('');

      // Detail
      $('budgetDetailList').innerHTML = items.map((b, i) => `
        <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
          <div>
            <strong>${b.category}</strong>
            <span class="badge ${b.percentage > 100 ? 'bg-danger' : b.percentage > 80 ? 'bg-warning' : 'bg-success'} ms-2">${b.percentage}%</span>
          </div>
          <div class="text-end">
            <small class="text-muted">¥ ${formatAmount(b.spent)} / ¥ ${formatAmount(b.budget)}</small>
          </div>
        </div>
      `).join('');
    } catch(e) {}
  }

  function openBudgetModal() {
    $('budgetForm').reset();
    const now = new Date();
    $('budgetSetYear').value = now.getFullYear();
    $('budgetSetMonth').value = now.getMonth() + 1;
    new bootstrap.Modal($('budgetModal')).show();
  }

  async function saveBudget() {
    const data = {
      category: $('budgetCategory').value.trim(),
      amount: parseFloat($('budgetAmount').value) || 0,
      year: parseInt($('budgetSetYear').value),
      month: parseInt($('budgetSetMonth').value),
    };
    if (!data.category) { toast('请输入类别', 'warning'); return; }
    if (!data.amount) { toast('请输入预算金额', 'warning'); return; }

    try {
      await api('/budgets', {
        method: 'POST',
        body: JSON.stringify(data),
      });
      toast('预算设置成功');
      bootstrap.Modal.getInstance($('budgetModal')).hide();
      loadBudgets();
    } catch(e) {}
  }

  // ══════════ Categories ══════════
  async function loadCategories() {
    try {
      const res = await api('/categories');
      const cats = res.data || [];
      if (!cats.length) {
        $('categoryList').innerHTML = '<div class="col-12"><div class="empty-state"><div class="icon">🏷️</div><p>暂无类别数据</p></div></div>';
        return;
      }
      $('categoryList').innerHTML = cats.map(c => `
        <div class="col-md-6 col-lg-4">
          <div class="card summary-card h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="mb-0">${c.name}</h6>
                <span class="badge bg-secondary">${c.total_count}笔</span>
              </div>
              <p class="fw-bold ${c.total_amount > 0 ? 'text-danger' : 'text-success'} mb-2">
                ¥ ${formatAmount(Math.abs(c.total_amount))}
              </p>
              ${c.subcategories.slice(0, 5).map(s => `
                <div class="d-flex justify-content-between small text-muted py-1">
                  <span>${s.name}</span>
                  <span>${s.count}笔 · ¥${formatAmount(s.amount)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `).join('');
    } catch(e) {}
  }

  // ══════════ Stats ══════════
  async function loadStats() {
    const year = $('statsYear').value;
    const groupBy = $('statsGroupBy').value;
    const params = new URLSearchParams();
    if (year) params.set('year', year);
    params.set('group_by', groupBy);

    try {
      const res = await api('/stats?' + params.toString());
      const items = res.data ? res.data.items : [];
      if (!items.length) {
        $('statsTableBody').innerHTML = '<tr><td colspan="4" class="text-muted text-center py-3">暂无数据</td></tr>';
        return;
      }

      // Table
      $('statsTableBody').innerHTML = items.map(i => `
        <tr>
          <td><strong>${i.group}</strong></td>
          <td><span class="badge ${i.type==='收入'?'badge-type-income':'badge-type-expense'}">${i.type}</span></td>
          <td class="${i.type==='收入'?'amount-income':'amount-expense'}">¥ ${formatAmount(i.total)}</td>
          <td>${i.count}笔</td>
        </tr>
      `).join('');

      // Chart
      if (state.statsChart) state.statsChart.destroy();

      const labels = items.filter(i => i.type==='支出').map(i => i.group);
      const expenseData = items.filter(i => i.type==='支出').map(i => i.total);
      // Also income if we want
      const incomeByGroup = {};
      items.filter(i => i.type==='收入').forEach(i => { incomeByGroup[i.group] = i.total; });

      const ctx = $('statsChart').getContext('2d');
      const colors = ['#ef4444','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16'];

      if (groupBy === 'month') {
        state.statsChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [
              { label: '支出', data: expenseData, backgroundColor: 'rgba(239,68,68,.7)', borderRadius: 4 },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, grace: '10%', ticks: { callback: v => '¥' + v.toLocaleString(), maxTicksLimit: 8 } } },
          },
        });
      } else {
        state.statsChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: labels,
            datasets: [{
              data: expenseData,
              backgroundColor: colors.slice(0, labels.length),
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'right', labels: { boxWidth: 12, padding: 8 } },
            },
          },
        });
      }
    } catch(e) {}
  }

  // ── Boot ──
  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
