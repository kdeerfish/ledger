# 📒 Ledger 文档站
site_name: Ledger 文档
site_description: 个人记账系统 - 收支管理、预算规划、多维度统计、Web 界面、AI Agent 集成
site_url: https://kdeerfish.github.io/ledger
repo_url: https://github.com/kdeerfish/ledger
repo_name: kdeerfish/ledger
edit_uri: edit/master/docs/

theme:
  name: material
  language: zh
  icon:
    logo: fontawesome/solid/book
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换主题
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kdeerfish/ledger
      name: GitHub
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/zouzhenglu/ledger
      name: Docker Hub
  generator: false

copyright: Copyright &copy; 2026 zouzhenglu

nav:
  - 🏠 首页: index.md
  - 🚀 快速开始:
    - 安装与上手: index.md#快速开始
    - CLI 速查: cli.md
    - Docker 部署: docker.md
  - 📘 CLI 命令参考: cli.md
  - 🌐 Web 界面: web.md
  - 🔌 API 文档: api.md
  - 🐳 Docker 部署: docker.md
  - 🛠 开发指南: development.md
  - 🇬🇧 English: en/README.md

plugins:
  - search
  - git-revision-date-localized:
      type: date
