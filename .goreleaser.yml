version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ledger
    main: ./cmd/ledger
    binary: ledger
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # ldflags 单独列,避免与 goreleaser 的默认 ldflags (-X main.version=...)
    # 重复触发 'ldflags is defined twice' 警告。
    ldflags:
      - -s
      - -w
      - -X github.com/kdeerfish/ledger/internal/version.Commit={{.Commit}}
      - -X github.com/kdeerfish/ledger/internal/version.BuildTime={{.Date}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  # 单个 archive 定义,通过 format_overrides 让 windows 单独走 zip。
  # 之前拆成两个 archive(default tar.gz + windows-archive zip) 没有 per-OS 过滤,
  # 导致每个 OS/Arch 都同时生成 tar.gz 和 zip,触发 brews pipe 报错:
  # 'one tap can handle only one archive of an OS/Arch combination'。
  - id: default
    formats: [tar.gz]
    name_template: "{{ .Binary }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - README.md
      - LICENSE
    format_overrides:
      - goos: windows
        formats: [zip]

dockers_v2:
  # GoReleaser v2.12+ 的新写法,一次 docker buildx build 同时构建多架构
  # (linux/amd64 + linux/arm64) 并推送 manifest + SBOM。
  # 取代了 v1 时代的 dockers (每个平台一条) + docker_manifests (合并 manifest) 两段。
  # 注意: dockers_v2 的构建上下文会把每个平台的二进制放到
  # $TARGETPLATFORM/<binary> 子目录里,Dockerfile 需要用 ARG TARGETPLATFORM 取出。
  #
  # 3 个镜像仓库 (Docker Hub 主 / GHCR 备份 / 阿里云 国内) 写在同一个条目里,
  # goreleaser 会对 images x tags 做笛卡尔积自动生成所有组合。
  #
  # 仓库命名继续用独立的 ledger-go 命名空间,与原 Python 版
  # (zouzhenglu/ledger) 并行不冲突,避免 latest tag 抢占。
  - id: ledger-go
    dockerfile: Dockerfile.goreleaser
    images:
      - docker.io/zouzhenglu/ledger-go
      - ghcr.io/kdeerfish/ledger-go
      - crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "Ledger (Go)"
      org.opencontainers.image.description: "个人记账系统 - Go 重写版本,体积更小,性能更好"
      org.opencontainers.image.source: "https://github.com/kdeerfish/ledger"
      org.opencontainers.image.licenses: "MIT"
    annotations:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.source: "{{ .GitURL }}"

nfpms:
  - id: packages
    package_name: ledger
    file_name_template: "{{ .ConventionalFileName }}"
    formats:
      - deb
      - rpm
    maintainer: kdeerfish <noreply@example.com>
    description: Personal accounting CLI / web (Go rewrite)
    license: MIT
    section: utils
    priority: optional

release:
  github:
    owner: kdeerfish
    name: ledger
  prerelease: auto
  draft: false
