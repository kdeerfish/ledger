version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ledger
    main: ./cmd/ledger
    binary: ledger
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -ldflags=-s -w -X github.com/kdeerfish/ledger/internal/version.Commit={{.Commit}} -X github.com/kdeerfish/ledger/internal/version.BuildTime={{.Date}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  # 单个 archive 定义,通过 format_overrides 让 windows 单独走 zip。
  # 之前拆成两个 archive(default tar.gz + windows-archive zip) 没有 per-OS 过滤,
  # 导致每个 OS/Arch 都同时生成 tar.gz 和 zip,触发 brews pipe 报错:
  # 'one tap can handle only one archive of an OS/Arch combination'。
  - id: default
    formats: [tar.gz]
    name_template: "{{ .Binary }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - README.md
      - LICENSE
    format_overrides:
      - goos: windows
        formats: [zip]

dockers:
  # Go 版发布到独立的 ledger-go 仓库,与原 Python 版 (zouzhenglu/ledger) 并行,
  # 避免 latest tag 冲突。原 Python 仓库保持原样不动。
  # GoReleaser v2: 每个平台单独一个条目,通过 docker_manifests 组合多平台。
  # ---- Docker Hub (amd64) ----
  - id: dockerhub-amd64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: amd64
    image_templates:
      - "docker.io/zouzhenglu/ledger-go:{{ .Version }}-amd64"
      - "docker.io/zouzhenglu/ledger-go:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
  # ---- Docker Hub (arm64) ----
  - id: dockerhub-arm64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: arm64
    image_templates:
      - "docker.io/zouzhenglu/ledger-go:{{ .Version }}-arm64"
      - "docker.io/zouzhenglu/ledger-go:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
  # ---- GHCR (amd64) ----
  - id: ghcr-amd64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/kdeerfish/ledger-go:{{ .Version }}-amd64"
      - "ghcr.io/kdeerfish/ledger-go:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
  # ---- GHCR (arm64) ----
  - id: ghcr-arm64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/kdeerfish/ledger-go:{{ .Version }}-arm64"
      - "ghcr.io/kdeerfish/ledger-go:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
  # ---- Aliyun (amd64) ----
  - id: aliyun-amd64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: amd64
    image_templates:
      - "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:{{ .Version }}-amd64"
      - "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
  # ---- Aliyun (arm64) ----
  - id: aliyun-arm64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: arm64
    image_templates:
      - "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:{{ .Version }}-arm64"
      - "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  # Docker Hub
  - name_template: "docker.io/zouzhenglu/ledger-go:{{ .Version }}"
    image_templates:
      - "docker.io/zouzhenglu/ledger-go:{{ .Version }}-amd64"
      - "docker.io/zouzhenglu/ledger-go:{{ .Version }}-arm64"
  - name_template: "docker.io/zouzhenglu/ledger-go:latest"
    image_templates:
      - "docker.io/zouzhenglu/ledger-go:latest-amd64"
      - "docker.io/zouzhenglu/ledger-go:latest-arm64"
  # GHCR
  - name_template: "ghcr.io/kdeerfish/ledger-go:{{ .Version }}"
    image_templates:
      - "ghcr.io/kdeerfish/ledger-go:{{ .Version }}-amd64"
      - "ghcr.io/kdeerfish/ledger-go:{{ .Version }}-arm64"
  - name_template: "ghcr.io/kdeerfish/ledger-go:latest"
    image_templates:
      - "ghcr.io/kdeerfish/ledger-go:latest-amd64"
      - "ghcr.io/kdeerfish/ledger-go:latest-arm64"
  # Aliyun
  - name_template: "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:{{ .Version }}"
    image_templates:
      - "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:{{ .Version }}-amd64"
      - "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:{{ .Version }}-arm64"
  - name_template: "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:latest"
    image_templates:
      - "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:latest-amd64"
      - "crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger-go:latest-arm64"

nfpms:
  - id: packages
    package_name: ledger
    file_name_template: "{{ .ConventionalFileName }}"
    formats:
      - deb
      - rpm
    maintainer: kdeerfish <noreply@example.com>
    description: Personal accounting CLI / web (Go rewrite)
    license: MIT
    section: utils
    priority: optional

brews:
  - name: ledger
    repository:
      owner: kdeerfish
      name: homebrew-tap
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

release:
  github:
    owner: kdeerfish
    name: ledger
  prerelease: auto
  draft: false
