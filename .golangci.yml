run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck      # 忽略返回错误
    - govet         # 标准 vet
    - staticcheck   # 高级静态检查
    - ineffassign   # 无效赋值
    - unused        # 未使用变量/常量/函数
    - gosimple      # 可简化的代码
    - gocritic      # 风格/性能
    - gofmt         # 格式
    - goimports     # import 排序
    - misspell      # 英文拼写
    - bodyclose     # http body 未关闭
    - nilerr        # 返回 nil 错误
    - prealloc      # slice 预分配
    - revive        # golint 替代

linters-settings:
  gocritic:
    enabled-tags: [diagnostic, performance, style]
    disabled-checks: [hugeParam]
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/kdeerfish/ledger

issues:
  exclude-dirs:
    - frontend/node_modules
    - frontend/dist
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gosimple, gocritic, revive]
    - path: internal/domain
      linters: [revive, gocritic]
      text: "exported.*should have comment"
  max-issues-per-linter: 0
  max-same-issues: 0
