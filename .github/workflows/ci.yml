name: ci

on:
  push:
    branches: [rewrite/go, master]
  pull_request:
    branches: [rewrite/go, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          cp -r frontend/dist internal/webui/dist
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          args: --timeout=5m

  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          cp -r frontend/dist internal/webui/dist
      - name: Download modules
        run: go mod download
      - name: Build
        run: go build -trimpath -o bin/ledger ./cmd/ledger
      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage
        run: |
          go tool cover -func=coverage.out | tail -1
      - name: Upload coverage artifact
        if: matrix.go == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Test with coverage
        run: npm run test:coverage
        working-directory: frontend
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  coverage:
    name: coverage
    needs: [test, frontend-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: artifacts/coverage/coverage.out
          flags: go
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload Frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: artifacts/frontend-coverage/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: build-${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [amd64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          cp -r frontend/dist internal/webui/dist
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.os == 'ubuntu-latest' && 'linux' || (matrix.os == 'windows-latest' && 'windows' || 'darwin') }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "$RUNNER_OS" = "Windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags "-s -w" -o "ledger-${RUNNER_OS}-${{ matrix.arch }}${EXT}" ./cmd/ledger
      - uses: actions/upload-artifact@v4
        with:
          name: ledger-${{ matrix.os }}-${{ matrix.arch }}
          path: ledger-*
