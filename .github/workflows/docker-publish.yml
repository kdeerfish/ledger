# ============================================================
# Ledger CI/CD — Docker build & multi-registry publish
#
# 【触发规则】
#   push master/main     → 构建 :latest         → 推送到 3 个仓库
#   push tag v*          → 构建 :<版本> + :latest → 推送到 3 个仓库
#   workflow_dispatch    → 手动指定版本标签
#
# 【推送目标】
#   - Docker Hub        docker.io/zouzhenglu/ledger
#   - 阿里云镜像服务     crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger
#
# 【所需 GitHub Secrets】
#   DOCKER_USERNAME    — Docker Hub 用户名 (zouzhenglu)
#   DOCKER_TOKEN       — Docker Hub Access Token
#   ALIYUN_USERNAME    — 阿里云账号 (kezhenlu@qq.com)
#   ALIYUN_PASSWORD    — 阿里云镜像服务密码
# ============================================================

name: Docker CI/CD

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: '自定义镜像标签（留空自动推断为 latest）'
        required: false
        type: string

env:
  # ── 镜像名称 ──────────────────────────────────────
  DOCKER_IMAGE: zouzhenglu/ledger
  ALIYUN_IMAGE: crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com/deerfish/ledger

  # ── Python ──────────────────────────────────────────
  PYTHON_VERSION: '3.11'

jobs:
  # ═══════════════════════════════════════════════════════
  # 1. 测试
  # ═══════════════════════════════════════════════════════
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest tests -v --tb=short

  # ═══════════════════════════════════════════════════════
  # 2. 构建 & 推送 Docker 镜像
  # ═══════════════════════════════════════════════════════
  docker:
    name: Build & Push to 2 registries
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 计算标签 ─────────────────────────────────────
      - name: Compute image tag
        id: tags
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version_tag }}" ]; then
            # workflow_dispatch 手动指定
            TAG="${{ github.event.inputs.version_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # tag push: v1.5.0 → 镜像 tag 1.5.0
            TAG="${GITHUB_REF_NAME#v}"
          else
            # push to master/main → latest
            TAG="latest"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building tag: ${TAG}"

      # ── 登录 Docker Hub ─────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ── 登录阿里云镜像服务 ──────────────────────────
      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-1bkinvfgt16i5pgx.cn-shenzhen.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # ── 构建 & 推送（2 个仓库） ─────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.tags.outputs.tag }}
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.ALIYUN_IMAGE }}:${{ steps.tags.outputs.tag }}
            ${{ env.ALIYUN_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ steps.tags.outputs.tag }}

      # ── 输出结果 ────────────────────────────────────
      - name: Summary
        run: |
          echo "### ✅ Docker 镜像已推送" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 仓库 | 标签 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.DOCKER_IMAGE }}\` | \`${{ steps.tags.outputs.tag }}\` \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.ALIYUN_IMAGE }}\` | \`${{ steps.tags.outputs.tag }}\` \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 拉取命令" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.tags.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.ALIYUN_IMAGE }}:${{ steps.tags.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
