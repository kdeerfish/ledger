# Ledger 文档站 - GitHub Pages 配置

title: Ledger 文档
description: 个人记账系统 - 收支管理、预算规划、多维度统计
url: "https://kdeerfish.github.io/ledger"
baseurl: ""

# 主题
remote_theme: jekyll/minima

# Minima 主题配置
minima:
  skin: auto
  date_format: "%Y-%m-%d"

# 导航
header_pages:
  - docs/index.md
  - docs/cli.md
  - docs/web.md
  - docs/docker.md
  - docs/api.md
  - docs/development.md

# 作者
author:
  name: zouzhenglu

# 插件
plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme

# 排除
exclude:
  - en/
